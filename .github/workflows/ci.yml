name: CI Quality Check

on:
  push:
    branches: [main, dev]   # Trigger when pushing to main or dev
  pull_request:
    branches: [ main ]        # Trigger when opening PRs toward main


jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # clones repo into the runner so the workflow can access the code
      - name: Install uv
        uses: astral-sh/setup-uv@v3  # installs the uv package manager in the CI environment
        with:
          enable-cache: true # speeds up builds by caching dependencies between runs

      - name: Set up Python
        run: uv python install 3.11
      - name: Lint with Ruff
        # On fait le check (erreurs) et le format (style)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Run Tests with Pytest
        # On lance les tests sur le dossier tests/ en ciblant src/
        run: uv run pytest --cov=src tests/
